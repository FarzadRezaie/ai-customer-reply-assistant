<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Customer Reply Assistant</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
        h1 { color: #0d9488; }
        textarea { width: 100%; height: 100px; padding: 10px; font-size: 14px; box-sizing: border-box; }
        button { background: #0d9488; color: white; border: none; padding: 12px 24px; font-size: 15px; border-radius: 6px; cursor: pointer; margin-top: 10px; }
        button:hover { background: #0b7d72; }
        #reply { margin-top: 20px; padding: 15px; background: #f4f4f4; border-radius: 6px; white-space: pre-wrap; min-height: 40px; }
    </style>
</head>
<body>
    <h1>AI Customer Reply Assistant</h1>
    <p>Paste a customer message and get a professional reply.</p>

    <textarea id="message" placeholder="Type the customer's message here..."></textarea>
    <br>
    <button onclick="getReply()">Generate Reply</button>

    <div id="reply"></div>

    <script>
        async function getReply() {
            const message = document.getElementById("message").value;
            const replyBox = document.getElementById("reply");
            replyBox.textContent = "Thinking...";

            const response = await fetch("/reply?message=" + encodeURIComponent(message));
            const text = await response.text();
            replyBox.textContent = text;
        }
    </script>
</body>
</html>
